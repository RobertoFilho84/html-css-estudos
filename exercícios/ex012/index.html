<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor</p>
<video width="560" height="315"  poster="Imagem/foto-p.png" controls autoplay loop>
    <source src="midea/Meu-Video.webm.webm" type="vídeo/webm">
    <source src="midea/Meu-Video.mp4v.mp4" type="vídeo/mp4v">
    <source src="midea/meu-video.mp4.mp4" type="vídeo/mp4">
    <p>Seu navegador não tem compatibilidade com reprodução de vídeos</p>
</video>
<h1>Inserindo Vídeos do Yotube</h1>
<iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=xlf3ir5it_sxjMS_" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
