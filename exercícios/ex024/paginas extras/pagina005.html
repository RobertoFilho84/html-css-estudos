<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
</head>
<body>
    <a href="#" onclick="clicou(); return false;">Clique em mim</a>
    <div id="saída"></div>

    <script>
        function clicou() {
            let s = document.getElementById("saída")
            s.innerHTML += "<P>você clicou</p>"
        }
    </script>
</body>
</html>
