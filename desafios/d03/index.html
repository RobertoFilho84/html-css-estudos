<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 03</title>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            max-width: 600px;
            margin: auto;
        }

        .grid img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Desafio do Mapa Mundi</h1>
    <p>Dá uma olhadinha na imagem a seguir</p>
    <div class="grid">
        <img src="Imagens/mapa01.png">
        <img src="Imagens/mapa02.png">
        <img src="Imagens/mapa03.png">

        <img src="Imagens/mapa04.png">
        <img src="Imagens/mapa05.png">
        <img src="Imagens/mapa06.png">

        <img src="Imagens/mapa07.png">
        <img src="Imagens/mapa08.png">
        <img src="Imagens/mapa9.png">
    </div>

</body>
</html>
